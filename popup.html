<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Article Checker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Article Checker</h2>
    <div class="form-group">
      <label for="api-key">Gemini API Key</label>
      <input type="password" id="api-key" placeholder="Enter API Key">
    </div>

    <div class="form-group">
      <label for="model">Model</label>
      <select id="model">
        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
        <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
      </select>
    </div>

    <div class="form-group">
      <label for="thinking-level">Thinking Level</label>
      <select id="thinking-level">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low" selected>Low</option>
      </select>
    </div>

    <div class="form-group">
      <label for="language">Target Language (optional)</label>
      <input type="text" id="language" placeholder="e.g. 繁體中文, English" value="繁體中文">
    </div>

    <hr>

    <div class="actions">
      <button id="btn-select-page" class="btn primary">Select Page Element</button>
      <!-- 分析時間壓不下來，先拿掉檔案上傳功能 -->
      <div class="file-upload" style="display: none;">
        <label for="file-input" class="btn secondary">Upload .txt / .docx</label>
        <input type="file" id="file-input" accept=".txt,.docx" style="display: none;">
      </div>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script src="mammoth.browser.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
